<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <rect id="bg" width="32" height="32" rx="8"/>
  </defs>
  <!-- Dark background -->
  <use href="#bg" fill="#06060e"/>
  <!-- Subtle border -->
  <use href="#bg" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
  <!-- "AS" text -->
  <text x="16" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif"
    font-weight="900" font-size="13" fill="url(#g)" letter-spacing="-0.5">AS</text>
</svg>
